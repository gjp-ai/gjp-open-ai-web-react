<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GJP AI Logo Recommendation</title>
    <style>
      :root {
        font-family: Avenir Next, Montserrat, Inter, Arial, sans-serif;
        color: #111827;
        background: #f3f4f8;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #5b6472;
      }

      .preview {
        display: grid;
        grid-template-columns: repeat(2, minmax(260px, 1fr));
        gap: 24px;
      }

      .panel {
        display: grid;
        justify-items: center;
        gap: 20px;
        padding: 36px;
        border-radius: 18px;
        border: 1px solid #dfe3eb;
      }

      .panel--light {
        background: #ffffff;
      }

      .panel--dark {
        --logo-bg: #020617;
        --logo-fg: #f8fafc;
        --logo-ring: #334155;
        background: #0c111d;
        border-color: #2a3549;
        color: #f8fafc;
      }

      .hero-logo {
        width: 168px;
        height: 168px;
      }

      .header-sample {
        width: 100%;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 18px;
        border-radius: 12px;
        background: #f3f4f8;
        box-sizing: border-box;
      }

      .panel--dark .header-sample {
        background: #111827;
      }

      .header-sample img {
        width: 48px;
        height: 48px;
      }

      .word {
        font-weight: 850;
        letter-spacing: 0;
      }

      @media (max-width: 720px) {
        body {
          padding: 18px;
        }

        .preview {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Recommended GJP AI Logo</h1>
    <p>A simpler circular mark: white in light mode, black in dark mode, with one restrained AI node accent.</p>
    <main class="preview">
      <section class="panel panel--light" aria-label="Light logo preview">
        <img class="hero-logo" src="/gjp-logo.svg" alt="GJP AI logo in light mode" />
        <div class="header-sample">
          <img src="/gjp-logo.svg" alt="" />
          <span class="word">Light header sample</span>
        </div>
      </section>
      <section class="panel panel--dark" aria-label="Dark logo preview">
        <img class="hero-logo" src="/gjp-logo.svg" alt="GJP AI logo in dark mode" />
        <div class="header-sample">
          <img src="/gjp-logo.svg" alt="" />
          <span class="word">Dark header sample</span>
        </div>
      </section>
    </main>
  </body>
</html>
